name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run build
      - name: smoke test npm package
        run: |
          npm pack --dry-run
          package="$(npm pack)"
          tmp="$(mktemp -d)"
          cd "$tmp"
          npm init -y >/dev/null
          npm install "$GITHUB_WORKSPACE/$package"
          npx blockcommit --help >/dev/null
          node --input-type=module - <<'NODE'
          import { createRequire } from "node:module";
          import { readFileSync } from "node:fs";

          const module = await import("blockcommit");
          const expected = [
            "digestAlgorithm",
            "digestCommit",
            "identityFlows",
            "renderContent",
            "renderIdentity",
            "renderIdentityFrom",
            "renderIdentityTo",
            "schemaVersion",
            "validateDigest",
            "verifyCommit",
            "verifyDigest"
          ];
          for (const key of expected) {
            if (!(key in module)) {
              throw new Error(`missing export ${key}`);
            }
          }

          const require = createRequire(import.meta.url);
          const schemaPath = require.resolve("blockcommit/schema/blockcommit.digest.v4.schema.json");
          const schema = JSON.parse(readFileSync(schemaPath, "utf8"));
          if (schema.properties?.schema_version?.const !== "blockcommit.digest.v4") {
            throw new Error("packed schema export is invalid");
          }
          const validation = module.validateDigest({ schema_version: "blockcommit.digest.v4" });
          if (validation.ok || validation.errors.length === 0) {
            throw new Error("packed validateDigest export is invalid");
          }
          NODE
      # The published bin runs under node, not bun; exercise dist/cli.js the
      # way an npm user would. A synthetic repo keeps this independent of the
      # checkout's depth and of pull_request merge commits (which digest
      # rejects as multi-parent).
      - name: smoke test built CLI under node
        run: |
          repo="$(mktemp -d)"
          git -C "$repo" init -q
          git -C "$repo" config user.email ci@example.com
          git -C "$repo" config user.name CI
          printf 'one\ntwo\nthree\n' > "$repo/a.txt"
          git -C "$repo" add . && git -C "$repo" commit -qm base
          git -C "$repo" mv a.txt b.txt
          printf 'added\n' > "$repo/a.txt"
          git -C "$repo" add . && git -C "$repo" commit -qm move
          node dist/cli.js view HEAD --cwd "$repo" | grep -q '^M a.txt'
          node dist/cli.js digest HEAD --cwd "$repo" > /dev/null
          range="$(git -C "$repo" rev-list --max-parents=0 HEAD)..HEAD"
          node dist/cli.js digest --range "$range" --format jsonl --cwd "$repo" > /dev/null
          node dist/cli.js cache verify --range "$range" --cwd "$repo"
